name: Sync meeting analytics

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Sync Notion database
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_SYNC_LIMIT: ${{ vars.NOTION_SYNC_LIMIT }}
        run: python scripts/sync_notion_meetings.py

      - name: Build analytics artifact
        run: python scripts/analyze_meetings.py

      - name: Commit updated analytics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh meeting analytics"
          file_pattern: data/meeting_notes_seed.json public/data/meeting_analytics.json
